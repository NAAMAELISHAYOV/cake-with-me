<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COOK WITH ME - מתכונים מתוקים</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="hero-carousel">
        <div class="carousel-slide" style="background-image: url('bdea3d59043ae2f77fadff83e46afb20.jpg');"></div>
        <div class="carousel-slide" style="background-image: url('image.png');"></div>
        <div class="carousel-slide" style="background-image: url('image copy.png');"></div>
        
        <div class="hero-overlay"></div>

        <div class="hero-content">
            <h1>COOK WITH ME</h1>
            <p>המקום שלכם למתכונים הכי <span id="typing-text"></span></p>

            <div class="search-container">
                <input type="text" id="searchInput" placeholder="חיפוש קטגוריה " onkeypress="if(event.key === 'Enter') searchRecipes()">
                <button onclick="searchRecipes()">חיפוש</button>
                <button id="darkModeToggle" class="mode-btn">🌙 מצב לילה</button>
                <button id="randomRecipeBtn" class="lucky-btn">🎲 הפתעה!</button>
            </div>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="cakes.html">עוגות</a></li>
            <li><a href="cookies.html">עוגיות</a></li>
            <li><a href="desserts.html">קינוחים</a></li>
            <li><a href="pastries.html">מאפים</a></li>
        </ul>
    </nav>

    <main>
        <section class="categories">
            <a href="cakes.html" class="category-link">   
                <div class="card">
                    <img src="bdea3d59043ae2f77fadff83e46afb20.jpg" alt="עוגות">
                    <h3>עוגות</h3>
                    <p>עוגות מעוצבות וחגיגיות</p>
                </div>
            </a>

            <a href="cookies.html" class="category-link">
                <div class="card">
                    <img src="8727cf71b9a8b6a2dc47fc9b49655491.jpg" alt="עוגיות">
                    <h3>עוגיות</h3>
                    <p>עוגיות פריכות ומעוצבות</p>
                </div>
            </a>

            <a href="desserts.html" class="category-link">
                <div class="card">
                    <img src="image.png" alt="קינוחים">
                    <h3>קינוחים</h3>
                    <p>קינוחים אישיים ומוסים</p>
                </div>
            </a>

            <a href="pastries.html" class="category-link">
                <div class="card">
                    <img src="image copy.png" alt="מאפים">
                    <h3>מאפים</h3>
                    <p>מאפי שמרים חמים</p>
                </div>
            </a>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
